</html><!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Add a New Book</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

<div class="card shadow" style="max-width: 500px; margin: auto;">
  <div class="card-header bg-primary text-white">
    <h3>Add a New Book to the Shelf</h3>
  </div>
  <div class="card-body">
    <form th:action="@{/save-book}" th:object="${book}" method="post">

      <div class="mb-3">
        <label class="form-label">Book Title</label>
        <input type="text" th:field="*{title}" class="form-control" placeholder="Enter title..." required>
      </div>

      <div class="mb-3">
        <label class="form-label">ISBN Number</label>
        <input type="text" th:field="*{isbn}" class="form-control" placeholder="Enter ISBN..." required>
      </div>

      <button type="submit" class="btn btn-success w-100">Save Book</button>
      <a th:href="@{/home}" class="btn btn-secondary w-100 mt-2">Cancel and go back</a>

    </form>
  </div>
</div>

</body>
</html>
