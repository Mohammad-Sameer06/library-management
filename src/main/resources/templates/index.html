<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <title>My Library</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

<div class="text-center mb-4">
  <h1 class="text-primary">Welcome to the Library!</h1>
  <p>Here are all the books we currently have.</p>
</div>

<table class="table table-bordered table-striped mt-3 shadow-sm">
  <thead class="table-dark">
  <tr>
    <th>Book Title</th>
    <th>ISBN Number</th>
    <th>Status</th>
    <th>Action</th> </tr>
  </thead>
  <tbody>
  <tr th:each="book : ${books}">
    <td th:text="${book.title}">Title</td>
    <td th:text="${book.isbn}">ISBN</td>

    <td>
      <span th:if="${book.isIssued}" class="badge bg-danger">Borrowed</span>
      <span th:if="${!book.isIssued}" class="badge bg-success">Available</span>
    </td>

    <td>
      <form th:if="${!book.isIssued}" th:action="@{/borrow/{id}(id=${book.id})}" method="post" style="display:inline;">
        <button type="submit" class="btn btn-sm btn-warning">Borrow</button>
      </form>

      <form th:if="${book.isIssued}" th:action="@{/return/{id}(id=${book.id})}" method="post" style="display:inline;">
        <button type="submit" class="btn btn-sm btn-info">Return</button>
      </form>
    </td>
  </tr>
  </tbody>
</table>
<div sec:authorize="hasRole('ADMIN')" class="mb-3 text-center">
  <a th:href="@{/add-book}" class="btn btn-success">➕ Add a New Book</a>
</div>
<footer class="text-center mt-5 mb-4 text-muted">
  <hr>
  <p>Built with ☕ by Sameer | B.Tech Student at GIET University</p>
</footer>
</body>
</html>
